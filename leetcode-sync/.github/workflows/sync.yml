name: Sync LeetCode Solutions

on:
  schedule:
    # Runs daily at 06:00 UTC — adjust if you want a different time
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Lets you click "Run workflow" manually from the Actions tab
    inputs:
      fetch_limit:
        description: "Number of recent submissions to fetch (max 50)"
        required: false
        default: "50"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync
        env:
          LEETCODE_USERNAME:    ${{ secrets.LEETCODE_USERNAME }}
          LEETCODE_SESSION:     ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN:  ${{ secrets.LEETCODE_CSRF_TOKEN }}
          LEETCODE_FETCH_LIMIT: ${{ github.event.inputs.fetch_limit || '50' }}
        run: python sync.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there's actually something new
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "sync: leetcode solutions — $TIMESTAMP"
            git push
          fi
